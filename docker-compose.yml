services:
  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    env_file: .env
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-devstoreaccount1}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-Eby8vdM02xNOcqFeqCnf2FlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==}
      AZURE_STORAGE_BLOB_ENDPOINT: ${AZURE_STORAGE_BLOB_ENDPOINT:-http://azurite:10000/devstoreaccount1}
      AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFeqCnf2FlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}"
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-cityair}
      AZURE_STORAGE_PREFIX: ${AZURE_STORAGE_PREFIX:-gold}
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    depends_on:
      - postgres
      - azurite
    command: ["python", "run_pipeline.py", "--source", "openweather", "--history-hours", "72"]
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    env_file: .env
    environment:
      DASHBOARD_DATA_PATH: ${DASHBOARD_DATA_PATH:-/app/data/gold/air_pollution_gold.parquet}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-devstoreaccount1}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-Eby8vdM02xNOcqFeqCnf2FlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==}
      AZURE_STORAGE_BLOB_ENDPOINT: ${AZURE_STORAGE_BLOB_ENDPOINT:-http://azurite:10000/devstoreaccount1}
      AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFeqCnf2FlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}"
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-cityair}
      AZURE_STORAGE_PREFIX: ${AZURE_STORAGE_PREFIX:-gold}
    volumes:
      - ./data:/app/data:ro
      - ./configs:/app/configs:ro
    ports:
      - "8501:8501"
    depends_on:
      - pipeline

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cityair
      POSTGRES_USER: cityair
      POSTGRES_PASSWORD: cityair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: ["azurite", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0"]
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

volumes:
  postgres_data:
  azurite_data:
