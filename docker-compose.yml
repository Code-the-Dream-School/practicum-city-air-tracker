services:
  migrate:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      azurite:
        condition: service_started
    command: ["python", "-m", "pipeline.cli", "--source", "openweather", "--history-hours", "72"]
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-cityair}
      POSTGRES_USER: ${POSTGRES_USER:-cityair}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cityair}
      DASHBOARD_CACHE_TTL_SECONDS: ${DASHBOARD_CACHE_TTL_SECONDS:-60}
    volumes:
      - ./configs:/app/configs:ro
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cityair
      POSTGRES_USER: cityair
      POSTGRES_PASSWORD: cityair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityair -d cityair"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command:
      [
        "azurite-blob",
        "--blobHost",
        "0.0.0.0",
        "--blobPort",
        "10000",
        "--location",
        "/data",
        "--skipApiVersionCheck",
      ]
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

  azurestorageexplorer:
    image: sebagomez/azurestorageexplorer:3.1.0
    ports:
      - "8081:8080"
    environment:
      AZURITE: "true"
      AZURE_STORAGE_CONNECTIONSTRING: ${AZURE_STORAGE_CONNECTION_STRING}
    depends_on:
      azurite:
        condition: service_started

volumes:
  postgres_data:
  azurite_data:
