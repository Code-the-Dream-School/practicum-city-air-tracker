services:
  migrate:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    env_file: .env
    depends_on:
      - postgres
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    depends_on:
      - postgres
      - migrate
    command: ["python", "-m", "pipeline.cli", "--source", "openweather", "--history-hours", "72"]
    restart: "no"

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-cityair}
      POSTGRES_USER: ${POSTGRES_USER:-cityair}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cityair}
      DASHBOARD_CACHE_TTL_SECONDS: ${DASHBOARD_CACHE_TTL_SECONDS:-60}
    volumes:
      - ./configs:/app/configs:ro
    ports:
      - "8501:8501"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cityair
      POSTGRES_USER: cityair
      POSTGRES_PASSWORD: cityair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
